<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NSE Market Viewer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ── HEADER / NAVIGATION ── -->
  <header class="header">
    <div class="header-container">
      <a href="{{ url_for('index') }}" class="logo">Trevano</a>
      
      <!-- Hamburger Menu Button (mobile) -->
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation menu" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      
      <nav class="nav" id="navMenu">
        <li class="nav-item">
          <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('equity') }}" {% if request.endpoint == 'equity' %}class="active"{% endif %}>Equity</a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('derivatives') }}" {% if request.endpoint == 'derivatives' %}class="active"{% endif %}>Derivatives</a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('debt') }}" {% if request.endpoint == 'debt' %}class="active"{% endif %}>Debt</a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('search') }}" {% if request.endpoint == 'search' %}class="active"{% endif %}>Search</a>
        </li>
      </nav>
      
      <div class="header-right">
        <span class="api-status" id="apiStatus">⏳ Checking API…</span>
      </div>
    </div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <div class="main-wrapper">
    <main class="content">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="footer-content">
        NSE Market Viewer &mdash; Data sourced from configured API endpoint
      </div>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
